services:
  mysql:
    image: mysql:8.4.8
    container_name: vmcontrolhub-mysql
    volumes:
      - mysql-data:/var/lib/mysql
    env_file:
      - env/mysql.env
      - env/timezone.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: valkey/valkey:9.0-alpine
    container_name: vmcontrolhub-redis
    env_file:
      - env/redis.env
      - env/timezone.env
    command:
      - sh
      - -c
      - valkey-server --requirepass $$REDIS_PASSWORD
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: ${APP_IMAGE}
    ports:
      - 5000:5000
    container_name: vmcontrolhub-app
    volumes:
      - ssh-data:/home/vmcontrolhub/.ssh
    env_file:
      - env/timezone.env
      - env/vmcontrolhub.env
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
  ssh-data: