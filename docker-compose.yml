services:
  mysql:
    build:
      context: .
      dockerfile: ./conf/mysql/Dockerfile
    image: vmcontrol-mysql-8.0.36:v1.0.0
    container_name: vmcontrolhub-mysql
    volumes:
      - mysql-data:/var/lib/mysql
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
    environment:
      MYSQL_ROOT_PASSWORD: "123456"    # 可以更改为任何字符串，实际使用时请更改为安全的密码.
      TZ: Asia/Shanghai
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -p$${MYSQL_ROOT_PASSWORD} -e 'SHOW DATABASES;' | grep -q 'vmcontrolhub'"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s


  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vmcontrol-app:v1.0.0
    container_name: vmcontrolhub-app
    ports:
      - "5000:5000"
    volumes:
      - ssh-data:/home/vmcontrolhub/.ssh
      - /usr/share/zoneinfo/Asia/Shanghai:/etc/localtime:ro
    environment:
      SSH_AUTH_SOCK: /home/vmcontrolhub/.ssh/ssh-agent.sock
      TZ: Asia/Shanghai
    restart: always
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  ssh-data: