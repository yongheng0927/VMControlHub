services:
  mysql:
    image: mysql:8.4.8
    container_name: vmcontrolhub-mysql
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    environment:
      TZ: Asia/Shanghai
    env_file:
      - env/mysql.env
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  app:
    image: vmcontrolhub/app:v2.0.0
    ports:
      - 5000:5000
    container_name: vmcontrolhub-app
    volumes:
      - ssh-data:/home/vmcontrolhub/.ssh
    environment:
      TZ: Asia/Shanghai
    env_file:
      - env/vmcontrolhub.env
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
  ssh-data: